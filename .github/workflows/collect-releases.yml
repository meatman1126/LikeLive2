name: Collect Releases

on:
  schedule:
    - cron: "0 17 * * *" # 毎日 02:00 JST (17:00 UTC)
  workflow_dispatch: # 手動実行も可能

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call collect-releases API
        run: |
          response=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://like-live2.vercel.app/api/jobs/collect-releases)

          echo "HTTP Status: $response"
          echo "Response body:"
          cat /tmp/response.json

          if [ "$response" != "200" ]; then
            echo "Error: API returned status $response"
            exit 1
          fi
